//====================================== 傳回農曆 y年的總天數
function lYearDays(y) {
   var i, sum = 348;
   for(i=0x8000; i>0x8; i>>=1) sum += (lunarInfo[y-1900] & i)? 1: 0;
   return(sum+leapDays(y));
}

//====================================== 傳回農曆 y年閏月的天數
function leapDays(y) {
   if(leapMonth(y)) return( (lunarInfo[y-1899]&0xf)==0xf? 30: 29);
   else return(0);
}

//====================================== 傳回農曆 y年閏哪個月 1-12 , 沒閏傳回 0
function leapMonth(y) {
   var lm = lunarInfo[y-1900] & 0xf;
   return(lm==0xf?0:lm);
}

//====================================== 傳回農曆 y年m月的總天數
function monthDays(y,m) {
   return( (lunarInfo[y-1900] & (0x10000>>m))? 30: 29 );
}


//====================================== 算出農曆, 傳入日期物件, 傳回農曆日期物件
//                                       該物件屬性有 .year .month .day .isLeap
function Lunar(objDate) {

   var i, leap=0, temp=0;
   var offset   = (Date.UTC(objDate.getFullYear(),objDate.getMonth(),objDate.getDate()) - Date.UTC(1900,0,31))/86400000;

   for(i=1900; i<2100 && offset>0; i++) { temp=lYearDays(i); offset-=temp; }

   if(offset<0) { offset+=temp; i--; }

   this.year = i;

   leap = leapMonth(i); //閏哪個月
   this.isLeap = false;

   for(i=1; i<13 && offset>0; i++) {
      //閏月
      if(leap>0 && i==(leap+1) && this.isLeap==false)
         { --i; this.isLeap = true; temp = leapDays(this.year); }
      else
         { temp = monthDays(this.year, i); }

      //解除閏月
      if(this.isLeap==true && i==(leap+1)) this.isLeap = false;

      offset -= temp;
   }

   if(offset==0 && leap>0 && i==leap+1)
      if(this.isLeap)
         { this.isLeap = false; }
      else
         { this.isLeap = true; --i; }

   if(offset<0){ offset += temp; --i; }

   this.month = i;
   this.day = offset + 1;
}

//==============================傳回國歷 y年某m+1月的天數
function solarDays(y,m) {
   if(m==1)
      return(((y%4 == 0) && (y%100 != 0) || (y%400 == 0))? 29: 28);
   else
      return(solarMonth[m]);
}
//============================== 傳入 offset 傳回干支, 0=甲子
function cyclical(num) {
   return(Gan[num%10]+Zhi[num%12]);
}

//============================== 月曆屬性
function calElement(sYear,sMonth,sDay,week,lYear,lMonth,lDay,isLeap,cYear,cMonth,cDay) {
   this.isToday    = false;
   //國歷
   this.sYear      = sYear;   //西元年4位數字
   this.sMonth     = sMonth;  //西元月數字
   this.sDay       = sDay;    //西元日數字
   this.week       = week;    //星期, 1個中文
   //農曆
   this.lYear      = lYear;   //西元年4位數字
   this.lMonth     = lMonth;  //農曆月數字
   this.lDay       = lDay;    //農曆日數字
   this.isLeap     = isLeap;  //是否為農曆閏月?
   //八字
   this.cYear      = cYear;   //年柱, 2個中文
   this.cMonth     = cMonth;  //月柱, 2個中文
   this.cDay       = cDay;    //日柱, 2個中文

   this.color      = '';

   this.lunarFestival = ''; //農曆節日
   this.solarFestival = ''; //國歷節日
   this.solarTerms    = ''; //節氣
}

//===== 某年的第n個節氣為幾日(從0小寒起算)
function sTerm(y,n) {
   var offDate = new Date( ( 31556925974.7*(y-1900) + sTermInfo[n]*60000  ) + Date.UTC(1900,0,6,2,5) );
   return(offDate.getUTCDate());
}




//============================== 傳回月曆物件 (y年,m+1月)
/*
功能說明: 傳回整個月的日期資料物件

使用方式: OBJ = new calendar(年,零起算月);

OBJ.length      傳回當月最大日
OBJ.firstWeek   傳回當月一日星期

由 OBJ[日期].屬性名稱 即可取得各項值

OBJ[日期].isToday  傳回是否為今日 true 或 false

其他 OBJ[日期] 屬性參見 calElement() 中的註解
*/
function Xcalendar(y,m) {

   var sDObj, lDObj, lY, lM, lD=1, lL, lX=0, tmp1, tmp2, tmp3;
   var cY, cM, cD; //年柱,月柱,日柱
   var lDPOS = new Array(3);
   var n = 0;
   var firstLM = 0;

   sDObj = new Date(y,m,1,0,0,0,0);    //當月一日日期

   this.length    = solarDays(y,m);    //國歷當月天數
   this.firstWeek = sDObj.getDay();    //國歷當月1日星期幾

   ////////年柱 1900年立春後為庚子年(60進制36)
   if(m<2) cY=cyclical(y-1900+36-1);
   else cY=cyclical(y-1900+36);
   var term2=sTerm(y,2); //立春日期

   ////////月柱 1900年1月小寒以前為 丙子月(60進制12)
   var firstNode = sTerm(y,m*2) //傳回當月「節」為幾日開始
   cM = cyclical((y-1900)*12+m+12);

   //當月一日與 1900/1/1 相差天數
   //1900/1/1與 1970/1/1 相差25567日, 1900/1/1 日柱為甲戌日(60進制10)
   var dayCyclical = Date.UTC(y,m,1,0,0,0,0)/86400000+25567+10;

   for(var i=0;i<this.length;i++) {

      if(lD>lX) {
         sDObj = new Date(y,m,i+1);    //當月一日日期
         lDObj = new Lunar(sDObj);     //農曆
         lY    = lDObj.year;           //農曆年
         lM    = lDObj.month;          //農曆月
         lD    = lDObj.day;            //農曆日
         lL    = lDObj.isLeap;         //農曆是否閏月
         lX    = lL? leapDays(lY): monthDays(lY,lM); //農曆當月最後一天

         if(n==0) firstLM = lM;
         lDPOS[n++] = i-lD+1;
      }

      //依節氣調整二月分的年柱, 以立春為界
      if(m==1 && (i+1)==term2) cY=cyclical(y-1900+36);
      //依節氣月柱, 以「節」為界
      if((i+1)==firstNode) cM = cyclical((y-1900)*12+m+13);
      //日柱
      cD = cyclical(dayCyclical+i);

      //sYear,sMonth,sDay,week,
      //lYear,lMonth,lDay,isLeap,
      //cYear,cMonth,cDay
      this[i] = new calElement(y, m+1, i+1, nStr1[(i+this.firstWeek)%7],
                               lY, lM, lD++, lL,
                               cY ,cM, cD );
      if(  (i+this.firstWeek)%7==0  || (i+this.firstWeek)%7==6  )   this[i].color = 'red';  //週日顏色	
   }

   //節氣
   tmp1=sTerm(y,m*2  )-1;
   tmp2=sTerm(y,m*2+1)-1;
   this[tmp1].solarTerms = solarTerm[m*2];
   this[tmp2].solarTerms = solarTerm[m*2+1];
   if(m==3) this[tmp1].color = 'red'; //清明顏色

   //國歷節日
   for(i in sFtv)
      if(sFtv[i].match(/^(\d{2})(\d{2})([\s\*])(.+)$/))
         if(Number(RegExp.$1)==(m+1)) {
            if(Number(RegExp.$2)<=this.length){
                s= RegExp.$4 ;
              if(RegExp.$3=='*') {this[Number(RegExp.$2)-1].color = 'red'; this[Number(RegExp.$2)-1].solarFestival=s.fontcolor('red');}
               else   this[Number(RegExp.$2)-1].solarFestival=s.fontcolor('blue');
            }
         }

   //月周節日
   for(i in wFtv)
      if(wFtv[i].match(/^(\d{2})(\d)(\d)([\s\*])(.+)$/))
         if(Number(RegExp.$1)==(m+1)) {
            tmp1=Number(RegExp.$2);
            tmp2=Number(RegExp.$3);
            if(tmp1<5)
               this[((this.firstWeek>tmp2)?7:0) + 7*(tmp1-1) + tmp2 - this.firstWeek].solarFestival += RegExp.$5.fontcolor("blue") ;
            else {
               tmp1 -= 5;
               tmp3 = (this.firstWeek+this.length-1)%7; //當月最後一天星期?
               this[this.length - tmp3 - 7*tmp1 + tmp2 - (tmp2>tmp3?7:0) - 1 ].solarFestival += RegExp.$5.fontcolor("blue") ;
            }
         }

   //農曆節日
   for(i in lFtv)
      if(lFtv[i].match(/^(\d{2})(.{2})([\s\*])(.+)$/)) {
         tmp1=Number(RegExp.$1)-firstLM;
         if(tmp1==-11) tmp1=1;
         if(tmp1 >=0 && tmp1<n) {
            tmp2 = lDPOS[tmp1] + Number(RegExp.$2) -1;
            if( tmp2 >= 0 && tmp2<this.length && this[tmp2].isLeap!=true) {
               s= RegExp.$4;
               if(RegExp.$3=='*') { this[tmp2].color = 'red';  this[tmp2].lunarFestival =s.fontcolor('red');}
               else  this[tmp2].lunarFestival =s.fontcolor('blue');
            }
         }
      }

//彈性假日
for(i in xFtv)
if(xFtv[i].match(/^(\d{4})(.{2})(.{2})([\s\*])(.*)$/)) {
    tmp1=Number(RegExp.$1);
    tmp2=Number(RegExp.$2);
    tmp3=Number(RegExp.$3);
    if ( ( tmp1== y ) && ( tmp2== (m+1) ) ){
       if(RegExp.$4=='*') 
                { this[tmp3-1].color= 'red';
                   //s=(RegExp.$5);
                   this[tmp3-1].solarFestival=RegExp.$5.fontcolor('red'); 
                }
              else
               { this[tmp3-1].color= 'green';
                 //s=(RegExp.$5);
                 this[tmp3-1].solarFestival=RegExp.$5.fontcolor('green');  
               }
     }
 
  }

   
   //今日
  if(y==tY && m==tM) this[tD-1].isToday = true;
}

//====================== 中文日期
function cDay(d){
   var s;

   switch (d) {
      case 10:
         s = '初十'; break;
      case 20:
         s = '二十'; break;
         break;
      case 30:
         s = '三十'; break;
         break;
      default :
         s = nStr2[Math.floor(d/10)];
         s += nStr1[d%10];
   }
   return(s);
}

    var month = targetDay.getMonth();
    var days = targetDay.getDate();
    //那一天是那一年中的第多少天
    for (var i = 0; i < month; i++) 
        days += calendar.getMonthDays(year, i);
     
    //那一年第一天是星期幾
    var yearFirstDay = new Date(year, 0, 1).getDay();
    //計算是第幾周
    days += yearFirstDay;
    var week = Math.ceil(days / 7);	//向上取整數
   return week;
},
 isLeapYear:function(year) {
    return (year % 400 == 0) || (year % 4 == 0 && year % 100 != 0);
},
 getMonthDays:function(year, month) {
    return [31, (calendar.isLeapYear(year) ? 29 : 28), 31, 30, 31, 30, 31, 31, 30, 31, 30, 31][month];
},
getDateturn:function(targetD){
	oDate1=new Date("2022/8/7")   //  輪班早班起算日期
	oDate2=targetD
   Diffdays=parseInt(Math.abs(oDate1 - oDate2) / 1000 / 60 / 60 / 24); 

	if(oDate1 < oDate2)
       return Math.floor(Diffdays/7)%3
     else
        return (Math.ceil(Diffdays/7)%3  == 0) ? 0 : (Math.ceil(Diffdays/7)%3  == 1) ? 2 : 1
 },
getYearGanZhi:function(SY){
var Gan=new Array("甲","乙","丙","丁","戊","己","庚","辛","壬","癸");
var Zhi=new Array("子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥");
return(Gan[(SY-4)%10]+Zhi[(SY-4)%12]);
},
getFirstDay:function(year,month){ //獲取每個月第一天星期幾
var firstDay = new Date(year,month,1);
return firstDay.getDay(); //getDay()方法來獲取
},
getMonthLen:function(year,month){ //獲取當月總共有多少天
var nextMonth = new Date(year,month+1,0); //獲取下個月的第一天
//nextMonth.setHours(nextMonth.getHours() - 1); //由於獲取的天是0時,所以減去1小時則可以得出該月的天數
return nextMonth.getDate(); //返回當天日期
},

function selectTextFile(files) {
    if (!files.length) {
        return false;
    }
    
    let file    = files[0];
    let reader = new FileReader();
    reader.onload = function () {
        document.getElementById('noteText').value = this.result;
    };
    
    reader.readAsText(file);
}

filename = `休假記錄_${new Date().toJSON().slice(0,10)}.txt` ;

a.click()

}
